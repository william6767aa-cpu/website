<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Primary Meta Tags -->
    <title>SMART Technologies - Interactive Displays & Collaboration Software</title>
    <meta name="title" content="SMART Technologies - Interactive Displays & Collaboration Software" />
    <meta name="description" content="Inspire collaboration and engagement with award-winning interactive displays and dynamic software. SMART Technologies connects people and ideas for education, business, and government." />
    <meta name="keywords" content="interactive display, collaboration software, smart board, digital whiteboard, education technology, business collaboration, government technology, Lumio" />
    <meta name="author" content="SMART Technologies" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.smarttech.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.smarttech.com/" />
    <meta property="og:title" content="SMART Technologies - Interactive Displays & Collaboration Software" />
    <meta property="og:description" content="Inspire collaboration and engagement with award-winning interactive displays and dynamic software." />
    <meta property="og:image" content="https://www.smarttech.com/hero-bg.jpg" />
    <meta property="og:site_name" content="SMART Technologies" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.smarttech.com/" />
    <meta property="twitter:title" content="SMART Technologies - Interactive Displays & Collaboration Software" />
    <meta property="twitter:description" content="Inspire collaboration and engagement with award-winning interactive displays and dynamic software." />
    <meta property="twitter:image" content="https://www.smarttech.com/hero-bg.jpg" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SMART Technologies",
      "url": "https://www.smarttech.com",
      "logo": "https://www.smarttech.com/logo.png",
      "description": "Award-winning interactive displays and collaboration software for education, business, and government.",
      "sameAs": [
        "https://www.facebook.com/SMARTTechnologies",
        "https://twitter.com/SMARTTech",
        "https://www.linkedin.com/company/smart-technologies",
        "https://www.youtube.com/user/SMART Technologies"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-877-299-0696",
        "contactType": "customer service",
        "availableLanguage": ["English"]
      }
    }
    </script>
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#6b4c9a" />
    
    <!-- Mobile Web App Capable -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SMART Technologies" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
